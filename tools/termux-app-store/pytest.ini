[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = tools
omit =
    tests/*
    */test_*.py
    *conftest*
    termux_app_store/*

[coverage:report]
omit =
    tests/*
    */test_*.py
    *conftest*
    termux_app_store/*
